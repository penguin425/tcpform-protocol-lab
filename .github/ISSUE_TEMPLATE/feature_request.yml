name: Feature request
description: Propose a focused improvement to tcpform
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user problem should be improved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Include example CLI or DSL syntax when relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note effects on the DSL, CLI, schemas, bundles, transports, and supported platforms.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for an existing issue or pull request.
          required: true
        - label: I am willing to help implement or test this feature.
          required: false

