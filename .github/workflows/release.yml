name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches Cargo package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(sed -n '/^\[package\]/,/^\[/s/^version = "\([^"]*\)"/\1/p' Cargo.toml)"
          test -n "$package_version"
          if [ "$tag_version" != "$package_version" ]; then
            echo "tag version $tag_version does not match Cargo.toml version $package_version" >&2
            exit 1
          fi

  build-unix:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: macos-latest
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package release archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          os="${{ matrix.artifact }}"
          arch="$(uname -m)"
          package="tcpform-v${version}-${os}-${arch}"
          mkdir -p "dist/$package"
          cp target/release/tcpform README.md LICENSE "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"
          rm -rf "dist/$package"
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package release archive
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $arch = $env:RUNNER_ARCH.ToLowerInvariant()
          $package = "tcpform-v$version-windows-$arch"
          New-Item -ItemType Directory -Path "dist/$package" -Force | Out-Null
          Copy-Item target/release/tcpform.exe, README.md, LICENSE "dist/$package/"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip"
          Remove-Item "dist/$package" -Recurse
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: dist/*
          if-no-files-found: error

  github-release:
    needs: [build-unix, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "tcpform $GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag \
              --latest
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber

  crates-io:
    needs: validate
    if: ${{ vars.PUBLISH_CRATE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
