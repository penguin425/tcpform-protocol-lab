name: Container Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: Existing release version to publish, without the v prefix
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: container-release-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      dockerhub-enabled: ${{ steps.dockerhub.outputs.enabled }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          requested_version="${{ inputs.version || github.ref_name }}"
          version="${requested_version#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "invalid release version: $requested_version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
      - name: Verify package version
        shell: bash
        run: |
          package_version="$(sed -n '/^\[package\]/,/^\[/s/^version = "\([^"]*\)"/\1/p' Cargo.toml)"
          test "${{ steps.release.outputs.version }}" = "$package_version"
      - name: Resolve Docker Hub mirroring
        id: dockerhub
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "$USERNAME" ] && [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$USERNAME" ] && [ -z "$TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be configured together" >&2
            exit 1
          fi

  runtime:
    needs: prepare
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      job-name-prefix: runtime
      runner: |
        default=ubuntu-24.04
        linux/arm=ubuntu-24.04-arm
        linux/arm64=ubuntu-24.04-arm
      output: image
      push: true
      context: https://github.com/${{ github.repository }}.git#${{ needs.prepare.outputs.tag }}
      target: runtime
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
      cache-scope: tcpform-runtime
      sbom: true
      sign: true
      set-meta-labels: true
      meta-images: |
        ghcr.io/${{ github.repository_owner }}/tcpform
      meta-tags: |
        type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
        type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
        type=semver,pattern={{major}},value=${{ needs.prepare.outputs.version }}
        type=raw,value=latest
      labels: |
        org.opencontainers.image.title=tcpform
        org.opencontainers.image.description=tcpform runtime image
        org.opencontainers.image.licenses=MIT
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  dashboard:
    needs: prepare
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      job-name-prefix: dashboard
      runner: |
        default=ubuntu-24.04
        linux/arm=ubuntu-24.04-arm
        linux/arm64=ubuntu-24.04-arm
      output: image
      push: true
      context: https://github.com/${{ github.repository }}.git#${{ needs.prepare.outputs.tag }}
      target: dashboard
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
      cache-scope: tcpform-dashboard
      sbom: true
      sign: true
      set-meta-labels: true
      meta-images: |
        ghcr.io/${{ github.repository_owner }}/tcpform-dashboard
      meta-tags: |
        type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
        type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
        type=semver,pattern={{major}},value=${{ needs.prepare.outputs.version }}
        type=raw,value=latest
      labels: |
        org.opencontainers.image.title=tcpform-dashboard
        org.opencontainers.image.description=tcpform dashboard image
        org.opencontainers.image.licenses=MIT
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  dockerhub:
    needs: [prepare, runtime, dashboard]
    if: needs.prepare.outputs.dockerhub-enabled == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: [tcpform, tcpform-dashboard]
    steps:
      - name: Install registry copy tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends skopeo
      - name: Mirror multi-platform image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          source="docker://ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          destination="docker://docker.io/${DOCKERHUB_USERNAME}/${{ matrix.image }}"
          for tag in "$VERSION" "${VERSION%.*}" "${VERSION%%.*}" latest; do
            skopeo copy --all --preserve-digests \
              --src-creds "$GHCR_USERNAME:$GHCR_TOKEN" \
              --dest-creds "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
              "$source:$tag" "$destination:$tag"
          done
      - uses: sigstore/cosign-installer@v3
      - name: Verify mirror digest and sign Docker Hub image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ghcr_digest="$(skopeo inspect --format '{{.Digest}}' \
            "docker://ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:$VERSION")"
          dockerhub_digest="$(skopeo inspect --creds "$DOCKERHUB_USERNAME:$DOCKERHUB_TOKEN" \
            --format '{{.Digest}}' \
            "docker://docker.io/${DOCKERHUB_USERNAME}/${{ matrix.image }}:$VERSION")"
          test "$ghcr_digest" = "$dockerhub_digest"
          cosign sign --yes "docker.io/${DOCKERHUB_USERNAME}/${{ matrix.image }}@$dockerhub_digest"
