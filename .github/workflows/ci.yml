name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.88"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo test --all --locked

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  case-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run --locked -- test --jobs 4 --tag smoke --junit tcpform-junit.xml examples/dns_cases.tcpf dns_lookup
      - run: printf '%s\n' '{"success_rate":1,"p95_us":1000,"coverage":1,"retries":0}' > tcpform-metrics.json
      - run: cargo run --locked -- gate tcpform-metrics.json --min-success-rate 1 --max-p95-us 5000 --min-coverage 1 --max-retries 0
      - uses: actions/upload-artifact@v7
        with:
          name: tcpform-junit
          path: tcpform-junit.xml

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --all --locked --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: lcov.info

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@cargo-fuzz
      - run: cargo fuzz run dsl --fuzz-dir fuzz -- -max_total_time=15
      - run: cargo fuzz run hex --fuzz-dir fuzz -- -max_total_time=15

  docker-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node dashboard/order.test.js
      - run: node dashboard/flow.test.js
      - run: node dashboard/packet-view.test.js
      - run: node dashboard/analysis-tools.test.js
      - run: node dashboard/advanced-tools.test.js
      - run: node dashboard/workbench-tools.test.js
      - run: ./scripts/docker-visual-lab.sh up
      - run: |
          curl --fail --silent http://127.0.0.1:8088/ | grep -q 'tcpform Visualizer'
          curl --fail --silent http://127.0.0.1:8088/data/catalog.json | grep -q 'Error: assertion failure'
          curl --fail --silent http://127.0.0.1:8088/data/udp-client.json | grep -q '"status":"ok"'
          curl --fail --silent http://127.0.0.1:8088/data/tcp-server.json | grep -q '"status":"ok"'
      - if: always()
        run: ./scripts/docker-visual-lab.sh down
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docker-raw-pcaps
          path: target/docker-raw/*
          if-no-files-found: ignore

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
